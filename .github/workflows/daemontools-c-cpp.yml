name: daemontools Ubuntu, Mac OSX CI

on:
  push:
    paths:
      - '**/daemontools-x/**'
      - .github/workflows/daemontools-c-cpp.yml
      - '!**/daemontools-x/debian/*'
      - '!**/daemontools-x/daemontools.spec.in'
      - '!**/daemontools-x/*.9'
      - '!**/daemontools-x/*.8'
      - '!**/daemontools-x/*.1'
      - '!**/doc/*'
      - '!**.md'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.host }}-${{ matrix.config.name }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-latest, macos-latest]

    steps:
    - name: extra_packages
      run: |
        if [ "${OS}" = "macos-latest" ]; then
          brew install automake autoconf libtool pkgconfig openssl
        fi
      env:
        OS: ${{ matrix.host }}

    - name: checkout_daemontools
      uses: actions/checkout@v4
      with:
        path: main

    - name: checkout_qmail
      uses: actions/checkout@v4
      with:
        repository: mbhangui/libqmail
        path: libqmail

    - name: install_qmail
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          # Dynamically fetch base paths for Homebrew dependencies
          OPENSSL_PREFIX=$(brew --prefix openssl@3)

          # Combine both paths cleanly into your compilation flags
          export CPPFLAGS="-I${OPENSSL_PREFIX}/include"
          export LDFLAGS="-L${OPENSSL_PREFIX}/lib"
        else
          # Standard flags for Ubuntu environment
          export CPPFLAGS="-I/usr/include/tirpc"
          export LDFLAGS=""
        fi
        cd libqmail
        ./default.configure
        make
        sudo make install-strip
      env:
        OS: ${{ matrix.host }}

    - name: build_daemontools
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          # Dynamically fetch base paths for Homebrew dependencies
          OPENSSL_PREFIX=$(brew --prefix openssl@3)

          # Combine both paths cleanly into your compilation flags
          export CPPFLAGS="-I${OPENSSL_PREFIX}/include"
          export CFLAGS="-I${OPENSSL_PREFIX}/include"
          export LDFLAGS="-L${OPENSSL_PREFIX}/lib"
        else
          # Standard flags for Ubuntu environment
          export CPPFLAGS=""
          export CFLAGS=""
          export LDFLAGS=""
        fi
        cd main/daemontools-x
        ./default.configure
        ./qmake
      env:
        OS: ${{ matrix.host }}
